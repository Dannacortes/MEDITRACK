<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDITRACK - Registro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-header">
                <h1>💊 Crear Cuenta</h1>
                <p>Regístrate para comenzar</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label>👤 Nombre completo</label>
                    <input type="text" id="fullname" placeholder="Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>📧 Correo electrónico</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>🔒 Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Confirmar contraseña</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary btn-block">Registrarse</button>
            </form>
            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="index.html">Iniciar Sesión</a></p>
            </div>
        </div>
    </div>
    <script src="pastillero/static/js/config.js"></script>
    <script src="pastillero/static/js/auth.js"></script>
</body>
</html>
