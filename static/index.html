<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDITRACK - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-header">
                <h1>💊 MEDITRACK</h1>
                <p>Dispensador inteligente de medicamentos</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>📧 Correo electrónico</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Iniciar Sesión</button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script src="firebase/config.js"></script>
    <script src="firebase/auth.js"></script>
</body>
</html>
